<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f766e" />
  <title>TalkBuddy — Welcome</title>
  <style>
    :root {
      --teal:      #0f766e;
      --teal-dark: #115e59;
      --teal-lt:   #ccfbf1;
      --ink:       #1e293b;
      --muted:     #64748b;
      --bg:        #f0faf8;
      --surface:   #ffffff;
      --shadow:    0 20px 60px rgba(15,118,110,0.14);
      --green:     #15803d;
      --amber:     #b45309;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: "Avenir Next", "Trebuchet MS", system-ui, sans-serif;
      background: linear-gradient(140deg, #e0f7f5 0%, var(--bg) 60%, #fef9f0 100%);
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    /* ── layout ── */
    .page {
      height: 100%; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--surface); border-radius: 40px;
      box-shadow: var(--shadow); padding: 36px 32px;
      max-width: 640px; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; max-height: 96vh; overflow-y: auto; scrollbar-width: none;
      cursor: pointer;
      animation: card-glow 2.4s ease-in-out infinite;
    }
    .card.active { cursor: default; animation: none; }
    .card::-webkit-scrollbar { display: none; }
    @keyframes card-glow {
      0%,100% { box-shadow: var(--shadow); }
      50%      { box-shadow: 0 8px 60px rgba(15,118,110,0.30), var(--shadow); }
    }
    /* ── lips SVG ── */
    .lips-wrap {
      width: clamp(180px, 36vw, 280px);
      filter: drop-shadow(0 6px 18px rgba(208,64,96,0.25));
    }
    .lips-wrap svg { width: 100%; height: auto; display: block; }
    .lips-wrap.idle   svg { animation: lips-breathe 3.5s ease-in-out infinite; }
    .lips-wrap.speak  svg { animation: lips-speak  0.30s ease-in-out infinite alternate; }
    .lips-wrap.listen svg { animation: lips-listen  1.2s ease-in-out infinite; }
    @keyframes lips-breathe {
      0%,100% { transform: scaleY(1) translateY(0); }
      50%      { transform: scaleY(1.05) translateY(-4px); }
    }
    @keyframes lips-speak {
      from { transform: scaleY(0.85); }
      to   { transform: scaleY(1.18); }
    }
    @keyframes lips-listen {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.07); }
    }
    /* ── step pills ── */
    .steps { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .step {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 5px 16px; border-radius: 999px;
      background: #e2e8f0; color: var(--muted); transition: background 300ms, color 300ms;
    }
    .step.active { background: var(--teal); color: #fff; }
    /* ── prompt ── */
    .prompt {
      font-size: clamp(1.1rem, 3.5vw, 1.7rem); font-weight: 700;
      color: var(--ink); text-align: center; line-height: 1.35; max-width: 500px;
    }
    /* ── spelled name display ── */
    .name-display {
      background: var(--teal-lt); border: 3px solid var(--teal);
      border-radius: 24px; padding: 16px 28px; width: 100%; text-align: center;
    }
    .name-letters {
      font-size: clamp(2.5rem, 9vw, 5.5rem); font-weight: 900;
      color: var(--teal-dark); letter-spacing: 0.14em; word-break: break-all;
    }
    /* ── interim heard text ── */
    .interim {
      font-size: 1rem; color: var(--teal-dark); font-style: italic;
      min-height: 1.5em; text-align: center; width: 100%; max-width: 440px;
      background: rgba(255,255,255,0.7); padding: 6px 18px; border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.08);
    }
    /* ── mic ring ── */
    .mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .mic-ring {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--teal-lt); display: flex; align-items: center; justify-content: center;
      font-size: 2rem; transition: background 300ms;
    }
    .mic-ring.listening { animation: mic-pulse 1.6s ease-out infinite; background: var(--teal-lt); }
    .mic-ring.idle      { background: #e2e8f0; }
    .mic-label { font-size: 0.9rem; color: var(--muted); font-weight: 600; }
    @keyframes mic-pulse {
      0%   { box-shadow: 0 0 0 0   rgba(15,118,110,0.35); }
      70%  { box-shadow: 0 0 0 36px rgba(15,118,110,0); }
      100% { box-shadow: 0 0 0 0   rgba(15,118,110,0); }
    }
    /* ── yes/no ── */
    .yn-row { display: flex; gap: 16px; width: 100%; justify-content: center; flex-wrap: wrap; }
    .yn-btn {
      flex: 1; max-width: 240px; min-height: 72px; border: none; border-radius: 999px;
      font-size: 1.3rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: transform 120ms, box-shadow 120ms;
    }
    .yn-btn:hover  { transform: translateY(-2px); }
    .yn-btn:active { transform: scale(0.97); }
    .yn-yes { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; box-shadow: 0 8px 24px rgba(21,128,61,0.28); }
    .yn-no  { background: linear-gradient(135deg, #dc2626, #b91c1c); color: #fff; box-shadow: 0 8px 24px rgba(185,28,28,0.26); }
    /* ── role selection (final step) ── */
    .role-row { display: flex; gap: 16px; width: 100%; justify-content: center; flex-wrap: wrap; }
    .role-btn {
      flex: 1; max-width: 260px; min-height: 120px; border: none; border-radius: 28px;
      font-weight: 700; cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      transition: transform 140ms, box-shadow 140ms;
    }
    .role-btn:hover  { transform: translateY(-3px); }
    .role-btn:active { transform: scale(0.97); }
    .role-icon { font-size: 3rem; line-height: 1; }
    .role-label { font-size: 1.15rem; }
    .role-child  { background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: #fff; box-shadow: 0 10px 32px rgba(15,118,110,0.30); }
    .role-parent { background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; box-shadow: 0 10px 32px rgba(124,58,237,0.28); }
    /* ── confirmation cards ── */
    .confirmations { display: grid; gap: 10px; width: 100%; }
    .confirm-card {
      display: none; background: rgba(255,255,255,0.82);
      border: 1px solid rgba(0,0,0,0.08); border-radius: 16px; padding: 12px 16px;
    }
    .confirm-card.visible { display: block; }
    .confirm-label { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--teal-dark); font-weight: 700; display: block; margin-bottom: 4px; }
    .confirm-value { font-size: 1rem; color: var(--ink); word-break: break-word; }
    /* ── skip ── */
    .skip-btn {
      background: none; border: none; color: var(--muted); font-size: 0.85rem;
      cursor: pointer; text-decoration: underline; padding: 6px 12px;
      min-height: 44px; opacity: 0; transition: opacity 0.5s;
    }
    /* ── util ── */
    [hidden] { display: none !important; }
  </style>
</head>
<body>
<div class="page">
  <div class="card" id="card">

    <!-- Animated lips -->
    <div class="lips-wrap idle" id="lips">
      <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 50 C50 20,80 15,100 22 C120 15,150 20,180 50 C155 40,130 36,100 38 C70 36,45 40,20 50 Z"
              fill="#e05c7a" stroke="#c0445f" stroke-width="1.5"/>
        <path d="M70 28 Q100 18 130 28" fill="none" stroke="#f08098" stroke-width="2" stroke-linecap="round"/>
        <path d="M20 50 C45 60,70 70,100 72 C130 70,155 60,180 50 C155 56,130 62,100 64 C70 62,45 56,20 50 Z"
              fill="#d44060" stroke="#b03050" stroke-width="1.5"/>
        <ellipse cx="100" cy="62" rx="30" ry="5" fill="#e87090" opacity="0.4"/>
      </svg>
    </div>

    <!-- Step progress -->
    <div class="steps">
      <span class="step active" id="step-child">Child Name</span>
      <span class="step"        id="step-caregiver">Caregiver</span>
      <span class="step"        id="step-ready">Ready!</span>
    </div>

    <!-- Main spoken prompt -->
    <p class="prompt" id="prompt">Welcome to TalkBuddy!<br><small style="font-weight:400;font-size:0.75em;color:#64748b">Tap anywhere to begin</small></p>

    <!-- Large letter display -->
    <div class="name-display" id="name-display" hidden>
      <div class="name-letters" id="name-letters"></div>
    </div>

    <!-- Interim transcript -->
    <div class="interim" id="interim" hidden></div>

    <!-- Mic -->
    <div class="mic-wrap" id="mic-wrap" hidden>
      <div class="mic-ring idle" id="mic-ring">🎤</div>
      <p class="mic-label" id="mic-label">Listening…</p>
    </div>

    <!-- Yes / No -->
    <div class="yn-row" id="yn-row" hidden>
      <button class="yn-btn yn-yes" id="yn-yes">✓ Yes, correct!</button>
      <button class="yn-btn yn-no"  id="yn-no">✗ No, try again</button>
    </div>

    <!-- Role selection — shown at the very end -->
    <div class="role-row" id="role-row" hidden>
      <button class="role-btn role-child" id="role-child">
        <span class="role-icon">🧒</span>
        <span class="role-label">I'm the child<br><small style="font-weight:400;font-size:0.8em">Start practice!</small></span>
      </button>
      <button class="role-btn role-parent" id="role-parent">
        <span class="role-icon">👨‍⚕️</span>
        <span class="role-label">Parent / Therapist<br><small style="font-weight:400;font-size:0.8em">Open dashboard</small></span>
      </button>
    </div>

    <!-- Confirmed name cards -->
    <div class="confirmations" id="confirmations">
      <article class="confirm-card" id="cc-first">
        <span class="confirm-label">Child First Name</span>
        <p class="confirm-value" id="cc-first-val"></p>
      </article>
      <article class="confirm-card" id="cc-last">
        <span class="confirm-label">Child Last Name</span>
        <p class="confirm-value" id="cc-last-val"></p>
      </article>
      <article class="confirm-card" id="cc-carer">
        <span class="confirm-label">Caregiver Name</span>
        <p class="confirm-value" id="cc-carer-val"></p>
      </article>
    </div>

    <button class="skip-btn" id="skip-btn">Skip — choose manually instead</button>
  </div>
</div>

<script>
(() => {
  'use strict';

  /* ── DOM ── */
  const card       = document.getElementById('card');
  const lips       = document.getElementById('lips');
  const prompt     = document.getElementById('prompt');
  const nameDisp   = document.getElementById('name-display');
  const nameLetters= document.getElementById('name-letters');
  const interim    = document.getElementById('interim');
  const micWrap    = document.getElementById('mic-wrap');
  const micRing    = document.getElementById('mic-ring');
  const micLabel   = document.getElementById('mic-label');
  const ynRow      = document.getElementById('yn-row');
  const ynYes      = document.getElementById('yn-yes');
  const ynNo       = document.getElementById('yn-no');
  const roleRow    = document.getElementById('role-row');
  const roleChild  = document.getElementById('role-child');
  const roleParent = document.getElementById('role-parent');
  const stepChild  = document.getElementById('step-child');
  const stepCarer  = document.getElementById('step-caregiver');
  const stepReady  = document.getElementById('step-ready');
  const skipBtn    = document.getElementById('skip-btn');
  const ccFirst    = document.getElementById('cc-first');
  const ccLast     = document.getElementById('cc-last');
  const ccCarer    = document.getElementById('cc-carer');
  const ccFirstVal = document.getElementById('cc-first-val');
  const ccLastVal  = document.getElementById('cc-last-val');
  const ccCarerVal = document.getElementById('cc-carer-val');

  /* ── State ── */
  const data = { firstName:'', lastName:'', carerName:'' };
  let started = false;

  /* ── Lips animation ── */
  function setLips(anim) { lips.className = `lips-wrap ${anim}`; }

  /* ── Step pills ── */
  function setStep(s) {
    [stepChild, stepCarer, stepReady].forEach(el => el.classList.remove('active'));
    if (s === 'child')  stepChild.classList.add('active');
    if (s === 'carer')  stepCarer.classList.add('active');
    if (s === 'ready')  stepReady.classList.add('active');
  }

  /* ── Mic ring ── */
  function setMic(mode, label) {
    micWrap.hidden = false;
    micRing.className = `mic-ring ${mode}`;
    micLabel.textContent = label;
  }
  function hideMic() { micWrap.hidden = true; }

  /* ── Name display ── */
  function showLetters(text) {
    nameLetters.textContent = text.toUpperCase();
    nameDisp.hidden = false;
  }
  function hideLetters() { nameDisp.hidden = true; }

  /* ── Interim ── */
  function setInterim(t) { interim.hidden = !t; interim.textContent = t || ''; }

  /* ── Speak ── */
  function speak(text) {
    return new Promise(resolve => {
      if (!text?.trim()) { resolve(); return; }
      if (!('speechSynthesis' in window)) { prompt.textContent = text; resolve(); return; }
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      const voices = window.speechSynthesis.getVoices();
      const pref = voices.find(v => /female|zira|aria|sara|jenny|ava|samantha|victoria|karen/i.test(v.name))
                || voices.find(v => v.lang.startsWith('en'));
      if (pref) u.voice = pref;
      u.rate = 0.92; u.pitch = 1.04;
      setLips('speak');
      prompt.textContent = text;
      const guard = setTimeout(() => { setLips('idle'); resolve(); }, Math.max(text.length * 75, 1200));
      const fin = () => { clearTimeout(guard); setLips('idle'); resolve(); };
      u.onend = fin; u.onerror = fin;
      window.speechSynthesis.speak(u);
    });
  }

  /* ── Listen ── */
  function listenOnce({ interimCb, timeout = 10000 } = {}) {
    return new Promise(resolve => {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { resolve(''); return; }
      const rec = new SR();
      rec.lang = 'en-US'; rec.continuous = false; rec.interimResults = !!interimCb;
      let done = false;
      const finish = val => { if (done) return; done = true; clearTimeout(t); try { rec.abort(); } catch {} resolve((val||'').trim()); };
      const t = setTimeout(() => finish(''), timeout);
      rec.onresult = e => {
        const results = Array.from(e.results);
        const text = results.map(r => r[0].transcript).join('');
        if (interimCb) interimCb(text);
        if (results[results.length-1].isFinal) finish(text);
      };
      rec.onerror = () => finish('');
      rec.onend   = () => finish('');
      try { rec.start(); } catch { finish(''); }
    });
  }

  /* ── Yes / No tap ── */
  function askYesNo() {
    return new Promise(resolve => {
      ynRow.hidden = false;
      const fin = val => {
        ynRow.hidden = true;
        ynYes.removeEventListener('click', onYes);
        ynNo.removeEventListener('click', onNo);
        resolve(val);
      };
      const onYes = () => fin(true);
      const onNo  = () => fin(false);
      ynYes.addEventListener('click', onYes);
      ynNo.addEventListener('click', onNo);
    });
  }

  /* ── Spell parsing ── */
  const NATO = { alpha:'A',bravo:'B',charlie:'C',delta:'D',echo:'E',foxtrot:'F',
    golf:'G',hotel:'H',india:'I',juliet:'J',kilo:'K',lima:'L',mike:'M',
    november:'N',oscar:'O',papa:'P',quebec:'Q',romeo:'R',sierra:'S',tango:'T',
    uniform:'U',victor:'V',whiskey:'W','x-ray':'X',yankee:'Y',zulu:'Z',
    ay:'A',bee:'B',see:'C',dee:'D',ee:'E',ef:'F',eff:'F',gee:'G',
    aitch:'H',eye:'I',jay:'J',kay:'K',el:'L',ell:'L',em:'M',en:'N',
    oh:'O',pee:'P',cue:'Q',are:'R',ar:'R',ess:'S',tee:'T',you:'U',
    vee:'V','double you':'W',ex:'X',why:'Y',zee:'Z',zed:'Z' };

  function parseSpelling(heard) {
    const tokens = heard.toLowerCase().split(/[\s\-,\.]+/).filter(Boolean);
    const letters = tokens.map(t =>
      (t.length === 1 && /[a-z]/.test(t)) ? t.toUpperCase() : (NATO[t] || '')
    );
    const result = letters.join('');
    return result || heard.replace(/\s+/g,'').toUpperCase().slice(0,20);
  }

  function titleCase(s) {
    return s.replace(/\w\S*/g, w => w[0].toUpperCase() + w.slice(1).toLowerCase());
  }

  /* ── Show confirmation card ── */
  function showCard(which, val) {
    if (which === 'first') { ccFirstVal.textContent = val; ccFirst.classList.add('visible'); }
    if (which === 'last')  { ccLastVal.textContent  = val; ccLast.classList.add('visible'); }
    if (which === 'carer') { ccCarerVal.textContent = val; ccCarer.classList.add('visible'); }
  }

  /* ── Collect name with spell+confirm loop ── */
  async function collectName(label) {
    while (true) {
      // Ask for name
      await speak(`Please say the child's ${label}.`);
      setMic('listening', 'Listening…');
      setInterim('');
      const heard = await listenOnce({ interimCb: t => setInterim(t), timeout: 9000 });
      hideMic(); setInterim('');

      // Ask to spell
      await speak(`Can you please spell the ${label}?`);
      setMic('listening', 'Spelling…');
      setInterim('');
      const spelt = await listenOnce({ interimCb: t => setInterim(t), timeout: 12000 });
      hideMic(); setInterim('');

      const letters = parseSpelling(spelt || titleCase(heard));
      showLetters(letters.split('').join('  '));

      // Confirm
      const readBack = `Please correct me if I'm wrong. Is the ${label}: ${letters.split('').join(', ')}?`;
      await speak(readBack);
      prompt.textContent = 'Is this correct?';
      const yes = await askYesNo();
      if (yes) { hideLetters(); return letters; }

      // Correction
      await speak(`Okay, please say the corrected spelling for the ${label}.`);
      setMic('listening', 'Correction…');
      setInterim('');
      const correction = await listenOnce({ interimCb: t => setInterim(t), timeout: 12000 });
      hideMic(); setInterim('');

      if (correction) {
        const corrected = parseSpelling(correction);
        showLetters(corrected.split('').join('  '));
        await speak(`Is the ${label} now: ${corrected.split('').join(', ')}?`);
        prompt.textContent = 'Is this right now?';
        const ok = await askYesNo();
        if (ok) { hideLetters(); return corrected; }
      }
    }
  }

  /* ── Collect caregiver name (no spelling) ── */
  async function collectCarerName() {
    await speak('And your name? Please say the parent or caregiver name.');
    setMic('listening', 'Listening…');
    setInterim('');
    const heard = await listenOnce({ interimCb: t => setInterim(t), timeout: 9000 });
    hideMic(); setInterim('');
    return titleCase(heard || 'Caregiver');
  }

  /* ── Match child and start session ── */
  async function startSessionForChild() {
    try {
      const children = await fetch('/children').then(r => r.json());
      const fn = data.firstName.charAt(0).toLowerCase();
      const matched = children.find(c => c.name.toLowerCase().startsWith(fn)) || children[0];
      if (!matched) return;
      const session = await fetch('/session/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ child_id: matched.child_id }),
      }).then(r => r.json());
      sessionStorage.setItem('tb_session_id',   session.session_id);
      sessionStorage.setItem('tb_child_id',      matched.child_id);
      sessionStorage.setItem('tb_child_name',    matched.name);
      sessionStorage.setItem('tb_session_data',  JSON.stringify(session));
    } catch { /* network unavailable — session.js will handle redirect */ }
  }

  /* ── Main wizard ── */
  async function runWizard() {
    setStep('child');

    await speak('Welcome to TalkBuddy!');

    // Child first name
    data.firstName = await collectName('first name');
    showCard('first', data.firstName);

    // Child last name
    data.lastName = await collectName('last name');
    showCard('last', data.lastName);

    setStep('carer');

    // Caregiver name
    data.carerName = await collectCarerName();
    showCard('carer', data.carerName);

    setStep('ready');

    await speak("Great! Let's start playing. Who is using this device?");

    // Role selection
    hideMic();
    hideLetters();
    setInterim('');
    ynRow.hidden = true;
    prompt.textContent = 'Who is using this device?';
    roleRow.hidden = false;
  }

  /* ── Role buttons ── */
  roleChild.addEventListener('click', async () => {
    roleRow.hidden = true;
    prompt.textContent = 'Starting your practice session…';
    setLips('speak');
    await startSessionForChild();
    window.location.href = '/session';
  });

  roleParent.addEventListener('click', () => {
    roleRow.hidden = true;
    prompt.textContent = 'Opening caregiver dashboard…';
    window.location.href = '/therapy';
  });

  /* ── Skip button ── */
  skipBtn.addEventListener('click', () => {
    window.location.href = '/therapy';
  });

  /* ── Tap anywhere on card to start ── */
  card.addEventListener('click', function onFirstTap() {
    card.removeEventListener('click', onFirstTap);
    card.classList.add('active');
    skipBtn.style.opacity = '1';
    // Warm up voices (user gesture now available)
    if ('speechSynthesis' in window) {
      const w = new SpeechSynthesisUtterance('');
      window.speechSynthesis.speak(w);
      window.speechSynthesis.cancel();
      window.speechSynthesis.getVoices();
    }
    if (!started) { started = true; runWizard().catch(() => { window.location.href = '/therapy'; }); }
  }, { once: true });

  // Pre-warm voices on page load
  if ('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices(), { once: true });
  }
})();
</script>
</body>
</html>
