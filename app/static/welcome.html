<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalkBuddy Welcome Session</title>
  <style>
    :root {
      --bg: #f6efe2;
      --ink: #2f241d;
      --muted: #6e655b;
      --teal: #0f766e;
      --teal-dark: #115e59;
      --card: rgba(255, 251, 245, 0.88);
      --line: rgba(47, 36, 29, 0.08);
      --shadow: 0 24px 60px rgba(45, 35, 25, 0.12);
      --accent: #c65a73;
      --mouth: #86283d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(15, 118, 110, 0.14), transparent 30%),
        linear-gradient(180deg, #fbf6ee 0%, var(--bg) 58%, #eee2d0 100%);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    .shell {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 28px 18px 38px;
    }

    .stage {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 34px 24px 30px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.2rem, 9vw, 5.8rem);
      line-height: 0.9;
      letter-spacing: -0.05em;
    }

    .avatar-wrap {
      position: relative;
      width: min(100%, 280px);
      margin: 18px auto 8px;
      padding-top: 8px;
    }

    .avatar-orb {
      position: absolute;
      inset: 20px 28px auto 28px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15,118,110,0.22), rgba(15,118,110,0.03) 68%, transparent 72%);
      filter: blur(5px);
      animation: glowFloat 4.8s ease-in-out infinite;
    }

    .avatar {
      position: relative;
      width: 100%;
      height: auto;
      z-index: 1;
      filter: drop-shadow(0 16px 24px rgba(36, 28, 18, 0.12));
    }

    .speaker.is-speaking .avatar {
      animation: bobTalk 0.85s ease-in-out infinite;
    }

    .speaker.is-speaking .avatar-orb {
      animation: glowPulse 1s ease-in-out infinite;
    }

    .speaker.is-speaking .mouth-open {
      opacity: 1;
      animation: mouthOpen 0.22s ease-in-out infinite alternate;
      transform-origin: center;
    }

    .speaker.is-speaking .mouth-lips {
      animation: lipMove 0.22s ease-in-out infinite alternate;
      transform-origin: center;
    }

    .status {
      min-height: 28px;
      margin: 8px auto 0;
      font-size: 0.98rem;
      color: var(--muted);
      line-height: 1.5;
      max-width: 520px;
    }

    .confirmations {
      margin: 26px auto 0;
      width: min(100%, 520px);
      display: grid;
      gap: 12px;
    }

    .confirm-card {
      display: none;
      text-align: left;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(47, 36, 29, 0.08);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .confirm-card.visible { display: block; }

    .confirm-label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.74rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--teal-dark);
      font-weight: 700;
    }

    .confirm-value {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.5;
      color: var(--ink);
      word-break: break-word;
    }

    .hint {
      margin-top: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    @keyframes mouthOpen {
      from { transform: scaleX(0.92) scaleY(0.7); }
      to { transform: scaleX(1.04) scaleY(1.52); }
    }

    @keyframes lipMove {
      from { transform: translateY(0px) scaleX(0.98); }
      to { transform: translateY(2px) scaleX(1.04); }
    }

    @keyframes bobTalk {
      from { transform: translateY(0px); }
      to { transform: translateY(-3px); }
    }

    @keyframes glowFloat {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-8px) scale(1.04); }
    }

    @keyframes glowPulse {
      0%, 100% { transform: scale(1); opacity: 0.82; }
      50% { transform: scale(1.12); opacity: 1; }
    }

    @media (max-width: 640px) {
      .shell { padding: 16px 12px 24px; }
      .stage { padding: 24px 16px 22px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="stage">
      <h1>TalkBuddy</h1>

      <div class="avatar-wrap speaker" id="speaker-shell">
        <div class="avatar-orb"></div>
        <svg class="avatar" viewBox="0 0 320 360" role="img" aria-label="Talking lady lips animation">
          <defs>
            <linearGradient id="skinTone" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f6d2bf" />
              <stop offset="100%" stop-color="#e9b89a" />
            </linearGradient>
            <linearGradient id="hairTone" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#4a3127" />
              <stop offset="100%" stop-color="#241812" />
            </linearGradient>
          </defs>
          <path d="M78 120c0-71 45-112 82-112 55 0 93 44 93 112v31H78z" fill="url(#hairTone)"/>
          <path d="M86 156c0-71 30-103 74-103 58 0 76 47 76 103v78c0 53-33 92-76 92-49 0-74-38-74-92z" fill="url(#skinTone)"/>
          <ellipse cx="126" cy="170" rx="11" ry="7" fill="#2c211d"/>
          <ellipse cx="195" cy="170" rx="11" ry="7" fill="#2c211d"/>
          <path d="M116 149c8-10 21-15 32-12" stroke="#4a3127" stroke-width="6" stroke-linecap="round" fill="none"/>
          <path d="M174 137c10-4 24 2 31 12" stroke="#4a3127" stroke-width="6" stroke-linecap="round" fill="none"/>
          <path d="M160 176c-5 11-8 23-8 35 7 3 15 3 22 0" stroke="#c88d73" stroke-width="4" stroke-linecap="round" fill="none"/>
          <g>
            <ellipse class="mouth-open" cx="160" cy="245" rx="21" ry="10" fill="#86283d" opacity="0"/>
            <path class="mouth-lips" d="M133 239c9 10 20 14 27 14 9 0 19-3 27-14" fill="none" stroke="#aa4c62" stroke-width="8" stroke-linecap="round"/>
            <path class="mouth-lips" d="M133 241c8 12 18 18 27 18 9 0 20-6 27-18" fill="none" stroke="#c06277" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
          </g>
          <path d="M110 300c15 15 34 24 50 24 21 0 40-7 56-24" stroke="#dca48d" stroke-width="7" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <p class="status" id="status-text">Welcome session will begin in a moment.</p>

      <div class="confirmations">
        <article class="confirm-card" id="confirm-first-name">
          <span class="confirm-label">Confirmed First Name Spelling</span>
          <p class="confirm-value" id="confirm-first-name-value"></p>
        </article>
        <article class="confirm-card" id="confirm-last-name">
          <span class="confirm-label">Confirmed Last Name Spelling</span>
          <p class="confirm-value" id="confirm-last-name-value"></p>
        </article>
        <article class="confirm-card" id="confirm-caregiver-name">
          <span class="confirm-label">Recorded Parent Or Caregiver Name</span>
          <p class="confirm-value" id="confirm-caregiver-name-value"></p>
        </article>
      </div>

      <p class="hint">Only the confirmed name spellings are shown on screen. Prompts are spoken aloud.</p>
    </section>
  </main>

  <script>
    (() => {
      const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const supportsRecognition = typeof Recognition !== 'undefined';
      const speakerShell = document.getElementById('speaker-shell');
      const statusText = document.getElementById('status-text');

      const cards = {
        firstName: document.getElementById('confirm-first-name'),
        lastName: document.getElementById('confirm-last-name'),
        caregiverName: document.getElementById('confirm-caregiver-name'),
      };
      const values = {
        firstName: document.getElementById('confirm-first-name-value'),
        lastName: document.getElementById('confirm-last-name-value'),
        caregiverName: document.getElementById('confirm-caregiver-name-value'),
      };

      const welcomeData = {
        childFirstNameAudioText: '',
        childLastNameAudioText: '',
        childFirstNameSpelling: '',
        childLastNameSpelling: '',
        caregiverNameAudioText: '',
        createdAt: '',
      };

      const flow = [
        { key: 'intro', prompt: 'Welcome to TalkBuddy.', mode: 'speak-only' },
        { key: 'childFirstName', prompt: 'Please say the kid's first name.', mode: 'listen' },
        { key: 'childLastName', prompt: 'Please say the kid's last name.', mode: 'listen' },
        { key: 'spellFirstName', prompt: 'Can you please spell first name?', mode: 'listen' },
        { key: 'confirmFirstName', prompt: 'Please correct me if I am wrong.', mode: 'confirm-first' },
        { key: 'spellLastName', prompt: 'Can you please spell last name?', mode: 'listen' },
        { key: 'confirmLastName', prompt: 'Please correct me if I am wrong.', mode: 'confirm-last' },
        { key: 'caregiverName', prompt: 'Please say the parent or caregiver name.', mode: 'listen' },
        { key: 'finish', prompt: 'Let's start playing.', mode: 'finish' },
      ];

      let currentStep = -1;
      let activePrompt = '';
      let isRunning = false;
      let recognition = null;

      function saveSession() {
        welcomeData.createdAt = welcomeData.createdAt || new Date().toISOString();
        sessionStorage.setItem('talkbuddy.welcomeSession', JSON.stringify(welcomeData));
      }

      function setSpeaking(active, status) {
        speakerShell.classList.toggle('is-speaking', active);
        if (status) {
          statusText.textContent = status;
        }
      }

      function normalizeSpelling(text) {
        return text
          .replace(/[^a-zA-Z\s-]/g, ' ')
          .trim()
          .replace(/\s+/g, ' ')
          .toUpperCase();
      }

      function showConfirmation(target, value) {
        const card = cards[target];
        const node = values[target];
        if (!card || !node || !value) return;
        node.textContent = value;
        card.classList.add('visible');
      }

      function speak(text, onDone) {
        activePrompt = text;
        if (!('speechSynthesis' in window)) {
          setSpeaking(false, text);
          onDone?.();
          return;
        }

        let completed = false;
        let started = false;
        const finish = (status) => {
          if (completed) return;
          completed = true;
          setSpeaking(false, status);
          onDone?.();
        };

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(v => /female|zira|aria|sara|jenny|ava|samantha|victoria|karen/i.test(v.name));
        if (preferred) utterance.voice = preferred;
        utterance.rate = 0.95;
        utterance.pitch = 1.04;
        utterance.onstart = () => {
          started = true;
          setSpeaking(true, 'Device is speaking...');
        };
        utterance.onend = () => finish('Listening for response...');
        utterance.onerror = () => finish('Speech playback was blocked. Tap anywhere to continue the welcome session.');
        window.speechSynthesis.speak(utterance);

        window.setTimeout(() => {
          if (!started && !completed) {
            finish('Speech playback needs a tap in this browser. Tap anywhere to continue the welcome session.');
          }
        }, 1600);
      }

      function listenOnce(onResult) {
        if (!supportsRecognition) {
          const typed = window.prompt('Speech recognition is not available in this browser. Type the response here:');
          onResult((typed || '').trim());
          return;
        }

        recognition?.abort();
        recognition = new Recognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.continuous = false;

        recognition.onresult = (event) => {
          const transcript = event.results?.[0]?.[0]?.transcript?.trim() || '';
          onResult(transcript);
        };
        recognition.onerror = () => {
          const typed = window.prompt('I did not catch that. Type the response here:');
          onResult((typed || '').trim());
        };
        recognition.onnomatch = () => {
          const typed = window.prompt('Please type the response so I can store it for this session:');
          onResult((typed || '').trim());
        };
        try {
          recognition.start();
        } catch {
          const typed = window.prompt('Please type the response so I can store it for this session:');
          onResult((typed || '').trim());
        }
      }

      function askYesNo(callback) {
        listenOnce((answer) => {
          const normalized = answer.toLowerCase();
          if (normalized.includes('yes')) {
            callback(true);
            return;
          }
          if (normalized.includes('no')) {
            callback(false);
            return;
          }
          callback(window.confirm('Was the spelling correct? Click OK for Yes or Cancel for No.'));
        });
      }

      function advance() {
        currentStep += 1;
        if (currentStep >= flow.length) return;
        runStep(flow[currentStep]);
      }

      function listenForStep(step) {
        listenOnce((transcript) => {
          const text = transcript || '(no response captured)';
          if (step.key === 'childFirstName') {
            welcomeData.childFirstNameAudioText = text;
            saveSession();
            advance();
            return;
          }
          if (step.key === 'childLastName') {
            welcomeData.childLastNameAudioText = text;
            saveSession();
            advance();
            return;
          }
          if (step.key === 'spellFirstName') {
            welcomeData.childFirstNameSpelling = normalizeSpelling(text);
            showConfirmation('firstName', welcomeData.childFirstNameSpelling);
            saveSession();
            advance();
            return;
          }
          if (step.key === 'spellLastName') {
            welcomeData.childLastNameSpelling = normalizeSpelling(text);
            showConfirmation('lastName', welcomeData.childLastNameSpelling);
            saveSession();
            advance();
            return;
          }
          if (step.key === 'caregiverName') {
            welcomeData.caregiverNameAudioText = text;
            showConfirmation('caregiverName', text);
            saveSession();
            advance();
          }
        });
      }

      function confirmSpelling(which) {
        const isFirst = which === 'first';
        const spelling = isFirst ? welcomeData.childFirstNameSpelling : welcomeData.childLastNameSpelling;
        const replay = spelling ? `${activePrompt} ${spelling.split(' ').join('. ')}.` : activePrompt;
        speak(replay, () => {
          askYesNo((accepted) => {
            if (accepted) {
              setSpeaking(false, 'Confirmation saved for this session.');
              advance();
              return;
            }
            const correctionPrompt = isFirst
              ? 'Please say the corrected first name spelling.'
              : 'Please say the corrected last name spelling.';
            speak(correctionPrompt, () => {
              listenOnce((correction) => {
                const normalized = normalizeSpelling(correction || spelling);
                if (isFirst) {
                  welcomeData.childFirstNameSpelling = normalized;
                  showConfirmation('firstName', normalized);
                } else {
                  welcomeData.childLastNameSpelling = normalized;
                  showConfirmation('lastName', normalized);
                }
                saveSession();
                setSpeaking(false, 'Correction stored for this session.');
                advance();
              });
            });
          });
        });
      }

      function finishWelcome() {
        saveSession();
        speak(activePrompt, () => {
          setSpeaking(false, 'Welcome session complete. Opening the session page...');
          window.setTimeout(() => {
            window.location.href = '/session';
          }, 2000);
        });
      }

      function runStep(step) {
        if (!step) return;
        activePrompt = step.prompt;

        if (step.mode === 'speak-only') {
          speak(step.prompt, () => advance());
          return;
        }
        if (step.mode === 'listen') {
          speak(step.prompt, () => listenForStep(step));
          return;
        }
        if (step.mode === 'confirm-first') {
          confirmSpelling('first');
          return;
        }
        if (step.mode === 'confirm-last') {
          confirmSpelling('last');
          return;
        }
        if (step.mode === 'finish') {
          finishWelcome();
        }
      }

      function startWelcome() {
        if (isRunning) return;
        isRunning = true;
        statusText.textContent = 'Starting welcome session...';
        advance();
      }

      if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices(), { once: true });
      }

      function resumeOnInteraction() {
        if (!isRunning) {
          startWelcome();
          return;
        }
        const step = flow[Math.max(currentStep, 0)];
        if (!step) return;
        if (step.mode === 'listen') {
          listenForStep(step);
          return;
        }
        if (step.mode === 'confirm-first') {
          confirmSpelling('first');
          return;
        }
        if (step.mode === 'confirm-last') {
          confirmSpelling('last');
        }
      }

      ['pointerdown', 'keydown'].forEach((eventName) => {
        window.addEventListener(eventName, () => {
          if (statusText.textContent.includes('Tap anywhere')) {
            resumeOnInteraction();
          }
        }, { passive: true });
      });

      window.setTimeout(() => {
        startWelcome();
      }, 2000);
    })();
  </script>
</body>
</html>
