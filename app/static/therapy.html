<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d9488" />
  <title>TalkBuddy — Therapist View</title>
  <link rel="stylesheet" href="/static/therapy.css" />
</head>
<body>

<div id="caregiver-mode" class="mode-screen" style="display:flex">

  <header class="caregiver-header" role="banner">
    <div class="caregiver-header-left">
      <h1 class="caregiver-title">TalkBuddy</h1>
      <span class="caregiver-sub">Therapist / Caregiver View</span>
    </div>
    <div class="caregiver-header-right">
      <label class="child-picker-label">
        <span>Child:</span>
        <select id="caregiver-child-select" aria-label="Select child">
          <option value="">Loading…</option>
        </select>
      </label>
      <button class="icon-btn" id="refresh-btn" aria-label="Refresh dashboard">
        <span aria-hidden="true">↻</span>
      </button>
    </div>
  </header>

  <main class="caregiver-grid" role="main">

    <section class="care-panel session-status-panel" aria-labelledby="panel-session-title">
      <h2 class="panel-title" id="panel-session-title">
        <span class="panel-icon" aria-hidden="true">📋</span> Current Session
      </h2>
      <div id="session-panel-content"><p class="care-empty">No active session.</p></div>
    </section>

    <section class="care-panel alerts-panel" aria-labelledby="panel-alerts-title">
      <h2 class="panel-title" id="panel-alerts-title">
        <span class="panel-icon" aria-hidden="true">⚠️</span> Alerts
        <span class="badge-count zero" id="alert-badge" aria-live="polite">0</span>
      </h2>
      <div id="alerts-panel-content" aria-live="polite"><p class="care-empty">No alerts. All good!</p></div>
    </section>

    <section class="care-panel progress-panel" aria-labelledby="panel-progress-title">
      <h2 class="panel-title" id="panel-progress-title">
        <span class="panel-icon" aria-hidden="true">📈</span> Progress
      </h2>
      <div id="progress-panel-content"><p class="care-empty">Select a child above to view progress.</p></div>
    </section>

    <section class="care-panel clinician-panel" aria-labelledby="panel-clinician-title">
      <h2 class="panel-title" id="panel-clinician-title">
        <span class="panel-icon" aria-hidden="true">🩺</span> Clinician Notes
      </h2>
      <div id="clinician-panel-content"><p class="care-empty">No pending reviews.</p></div>
    </section>

  </main>
</div>

<script>
'use strict';

function esc(t) {
  return String(t ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(path + ' ' + r.status);
  return r.json();
}

async function loadDashboard(childId) {
  if (!childId) return;
  const [alerts, report] = await Promise.all([
    api(`/caregiver/alerts?caregiver_id=${encodeURIComponent(childId)}`).catch(() => []),
    api(`/reports/child/${encodeURIComponent(childId)}`).catch(() => null),
  ]);

  // Alerts
  const alertEl = document.getElementById('alerts-panel-content');
  const badge   = document.getElementById('alert-badge');
  if (!alerts.length) {
    alertEl.innerHTML = '<p class="care-empty">No alerts. All good!</p>';
    badge.textContent = '0'; badge.classList.add('zero');
  } else {
    badge.textContent = alerts.length; badge.classList.remove('zero');
    alertEl.innerHTML = alerts.map(a => `
      <div class="alert-item" data-id="${esc(a.alert_id)}">
        <span class="alert-reason">${esc(a.reason.replace(/_/g,' '))}</span>
        <p class="alert-message">${esc(a.message)}</p>
        <span class="alert-meta">${new Date(a.created_at).toLocaleString()}</span>
        <button class="ack-btn" data-id="${esc(a.alert_id)}">Acknowledge</button>
      </div>`).join('');
    alertEl.querySelectorAll('.ack-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        await fetch(`/caregiver/alerts/${btn.dataset.id}/acknowledge`, {method:'POST'}).catch(()=>{});
        btn.closest('.alert-item').remove();
        const rem = alertEl.querySelectorAll('.alert-item').length;
        badge.textContent = rem || '0';
        if (!rem) { alertEl.innerHTML = '<p class="care-empty">No alerts. All good!</p>'; badge.classList.add('zero'); }
      });
    });
  }

  // Session status
  const sessEl = document.getElementById('session-panel-content');
  if (report?.recent_sessions?.length) {
    const s = report.recent_sessions[0];
    const statusLabel = {active:'Active',completed:'Completed',escalated:'⚠ Escalated'}[s.status] || s.status;
    sessEl.innerHTML = `
      <div class="stat-row"><span>Status</span><span class="stat-value">${statusLabel}</span></div>
      <div class="stat-row"><span>Target</span><span class="stat-value">${esc(s.current_target)}</span></div>
      <div class="stat-row"><span>Points</span><span class="stat-value">⭐ ${s.reward_points}</span></div>
      <div class="stat-row"><span>Started</span><span class="stat-value" style="font-size:var(--sz-base)">${new Date(s.started_at).toLocaleString()}</span></div>`;
  } else {
    sessEl.innerHTML = '<p class="care-empty">No recent sessions.</p>';
  }

  // Progress
  const progEl = document.getElementById('progress-panel-content');
  if (report?.progress?.length) {
    progEl.innerHTML = [...report.progress]
      .sort((a,b) => b.mastery_score - a.mastery_score)
      .slice(0, 10)
      .map(p => {
        const pct = Math.round(p.mastery_score * 100);
        return `<div class="progress-item">
          <span class="progress-word">${esc(p.target_text)}</span>
          <span class="progress-pct">${pct}%</span>
          <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join('');
  } else {
    progEl.innerHTML = '<p class="care-empty">No practice data yet.</p>';
  }

  // Clinician
  if (report?.child?.clinician_id) {
    const reviews = await api(`/clinician/queue?clinician_id=${encodeURIComponent(report.child.clinician_id)}`).catch(() => []);
    const clinEl = document.getElementById('clinician-panel-content');
    clinEl.innerHTML = reviews.length
      ? reviews.map(r => `<div class="review-item">
          <span class="review-priority ${esc(r.priority)}">${esc(r.priority.toUpperCase())} PRIORITY</span>
          <p class="review-summary">${esc(r.summary)}</p>
        </div>`).join('')
      : '<p class="care-empty">No pending reviews.</p>';
  }
}

async function boot() {
  const children = await api('/children').catch(() => []);
  const sel = document.getElementById('caregiver-child-select');
  sel.innerHTML = children.map(c =>
    `<option value="${esc(c.child_id)}">${esc(c.name)} (${c.age})</option>`
  ).join('');
  if (children.length) {
    sel.value = children[0].child_id;
    loadDashboard(children[0].child_id);
  }
  sel.addEventListener('change', e => loadDashboard(e.target.value));
  document.getElementById('refresh-btn').addEventListener('click', () => loadDashboard(sel.value));
}

boot();
setInterval(() => {
  const sel = document.getElementById('caregiver-child-select');
  if (sel?.value) loadDashboard(sel.value);
}, 30000); // auto-refresh every 30 s
</script>
</body>
</html>
